services:
  - type: web
    name: daily-dashboard-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt && python download_nltk.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
